  <!-- Inline critical CSS for instant first paint -->
  <style>
    #root { min-height: 100vh; }
    body { margin: 0; font-family: 'Noto Sans Thai', 'Noto Sans', sans-serif; }
    .initial-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      background:
        linear-gradient(160deg, #FFFFFF 0%, #FAFAF8 40%, #F5F3EF 70%, #EDEAE4 100%);
      position: relative;
      overflow: hidden;
    }
    .initial-loader img {
      position: relative;
      height: 160px;
      max-width: 78vw;
      width: auto;
      filter: drop-shadow(0 6px 20px rgba(15,23,42,0.10));
      animation: logoIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .initial-loader .tagline {
      position: relative;
      color: #1E293B;
      font-size: 15px;
      letter-spacing: 0.08em;
      line-height: 1.7;
      max-width: 380px;
      text-align: center;
      padding: 0 24px;
      font-weight: 500;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 0.45s forwards;
    }
    .initial-loader .bar {
      position: relative;
      width: 260px; height: 6px;
      background: rgba(15,23,42,0.10);
      border-radius: 999px;
      overflow: hidden;
      opacity: 0;
      box-shadow: inset 0 1px 2px rgba(15,23,42,0.06);
      animation: fadeUp 0.6s ease-out 0.65s forwards;
    }
    .initial-loader .bar::after {
      content: '';
      display: block;
      width: 45%; height: 100%;
      background: linear-gradient(90deg, transparent, #D4812A 30%, #F59E0B 50%, #D4812A 70%, transparent);
      border-radius: 999px;
      animation: slide 1.4s ease-in-out infinite;
    }

    @keyframes logoIn {
      0% { opacity: 0; transform: scale(0.7) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Inline premium loader shown before React mounts -->
    <div class="initial-loader" aria-label="Loading">
      <img src="/jw-group-logo.png" alt="JW Group" />
      <span class="tagline">Excellence in Every Detail</span>
      <div class="bar"></div>
    </div>
  </div>

  <script type="module" src="/src/main.tsx"></script>
</body>
